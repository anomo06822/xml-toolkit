<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/datatoolkit-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#13100e" />
    <title>DataToolkit - XML, JSON, Markdown Tools</title>
    <meta name="description" content="Professional toolkit for XML, JSON, and Markdown. Format, sort, compare, convert, and visualize your data." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          colors: {
            transparent: 'transparent',
            current: 'currentColor',
            white: '#fffaf4',
            black: '#0f0c0a',
            background: 'rgb(var(--dt-bg-rgb) / <alpha-value>)',
            surface: 'rgb(var(--dt-surface-rgb) / <alpha-value>)',
            editor: 'rgb(var(--dt-editor-rgb) / <alpha-value>)',
            gutter: 'rgb(var(--dt-gutter-rgb) / <alpha-value>)',
            primary: 'rgb(var(--dt-accent-rgb) / <alpha-value>)',
            secondary: 'rgb(var(--dt-text-secondary-rgb) / <alpha-value>)',
            accent: 'rgb(var(--dt-accent-strong-rgb) / <alpha-value>)',
            slate: {
              50: '#f7f1ea',
              100: '#efe6db',
              200: '#d9cdc0',
              300: '#c1b1a0',
              400: '#a59280',
              500: '#897664',
              600: '#6a5a4d',
              700: '#4d4037',
              800: '#302823',
              900: '#221d18',
              950: '#161210'
            },
            blue: {
              300: '#cad4d9',
              400: '#aebdc5',
              500: '#8799a4',
              600: '#697a84'
            },
            green: {
              300: '#d5dfca',
              400: '#b7c6a5',
              500: '#90a67a',
              600: '#6f815d'
            },
            purple: {
              300: '#dcc8d1',
              400: '#b999aa',
              500: '#947588',
              600: '#72596a'
            },
            red: {
              300: '#e4c0b7',
              400: '#d29a8e',
              500: '#c97a68',
              600: '#a55e4e',
              700: '#7a4539'
            },
            amber: {
              300: '#edcfaa',
              400: '#dbb382',
              500: '#c87b48',
              600: '#a86138'
            }
          },
          extend: {
            boxShadow: {
              panel: 'var(--dt-shadow-panel)',
              glow: 'var(--dt-shadow-accent)'
            }
          }
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --dt-bg: #13100e;
        --dt-bg-rgb: 19 16 14;
        --dt-bg-raised: #181412;
        --dt-surface: #211b17;
        --dt-surface-rgb: 33 27 23;
        --dt-editor: #181310;
        --dt-editor-rgb: 24 19 16;
        --dt-gutter: #241d18;
        --dt-gutter-rgb: 36 29 24;
        --dt-text: #f3ece3;
        --dt-text-secondary: #d4c8bc;
        --dt-text-secondary-rgb: 212 200 188;
        --dt-text-muted: #9b8d7e;
        --dt-accent: #c87b48;
        --dt-accent-rgb: 200 123 72;
        --dt-accent-strong: #e39a63;
        --dt-accent-strong-rgb: 227 154 99;
        --dt-accent-soft: rgba(200, 123, 72, 0.16);
        --dt-shadow-panel: 0 28px 60px rgba(0, 0, 0, 0.26);
        --dt-shadow-accent: 0 14px 36px rgba(200, 123, 72, 0.18);
      }

      body { 
        background-color: var(--dt-bg);
        color: var(--dt-text);
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { 
        width: 8px; 
        height: 8px; 
      }
      ::-webkit-scrollbar-track { 
        background: #1b1613; 
      }
      ::-webkit-scrollbar-thumb { 
        background: #615449; 
        border-radius: 4px; 
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: #7a6a5d; 
      }
      
      /* Animation utilities */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slide-in-from-top-1 {
        from { transform: translateY(-4px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      .animate-in {
        animation: fade-in 0.2s ease-out, slide-in-from-top-1 0.2s ease-out;
      }
      
      /* Selection color */
      ::selection {
        background-color: var(--dt-accent-soft);
      }

    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@19.1.0/",
    "react": "https://esm.sh/react@19.1.0",
    "react-dom/": "https://esm.sh/react-dom@19.1.0/",
    "lucide-react": "https://esm.sh/lucide-react@0.454.0"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
