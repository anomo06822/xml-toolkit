<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataToolkit - XML, JSON, Markdown Tools</title>
    <meta name="description" content="Professional toolkit for XML, JSON, and Markdown. Format, sort, compare, convert, and visualize your data." />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0f172a', // Slate 950
              surface: '#1e293b', // Slate 800
              primary: '#3b82f6', // Blue 500
              secondary: '#64748b', // Slate 500
              accent: '#f59e0b', // Amber 500
            }
          }
        }
      }
    </script>
    <style>
      body { 
        background-color: #0f172a; 
        color: #f8fafc; 
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { 
        width: 8px; 
        height: 8px; 
      }
      ::-webkit-scrollbar-track { 
        background: #1e293b; 
      }
      ::-webkit-scrollbar-thumb { 
        background: #475569; 
        border-radius: 4px; 
      }
      ::-webkit-scrollbar-thumb:hover { 
        background: #64748b; 
      }
      
      /* Animation utilities */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes slide-in-from-top-1 {
        from { transform: translateY(-4px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      
      .animate-in {
        animation: fade-in 0.2s ease-out, slide-in-from-top-1 0.2s ease-out;
      }
      
      /* Selection color */
      ::selection {
        background-color: rgba(59, 130, 246, 0.3);
      }

    </style>

    "lucide-react": "https://esm.sh/lucide-react@0.454.0"

}
</script>
  </head>
