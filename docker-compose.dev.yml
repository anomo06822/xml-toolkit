# ==============================================
# DataToolkit - Multi-Format Data Processing Tool
# Docker Development Compose
# ==============================================

services:
  # ==============================================
  # Development Server with Hot Reload
  # ==============================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: datatoolkit-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - datatoolkit-dev-network

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: datatoolkit-dev-backend
    working_dir: /app
    ports:
      - "5188:5188"
    volumes:
      - .:/app
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5188
      - DATATOOLKIT_CONFIG_PATH=/app/config/backend/ai.secrets.json
    command: dotnet run --project backend/DataToolkit.Api/DataToolkit.Api.csproj --urls http://0.0.0.0:5188
    networks:
      - datatoolkit-dev-network

networks:
  datatoolkit-dev-network:
    driver: bridge
