name: desktop-package

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - feature/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dotnet_runtime: osx-arm64
            publish_dir: backend/publish/mac
            builder_cmd: npm run desktop:dist:mac:ci
          - os: windows-latest
            dotnet_runtime: win-x64
            publish_dir: backend/publish/win
            builder_cmd: npm run desktop:dist:win:ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set update feed repository
        shell: bash
        run: |
          REPO_FULL="${GITHUB_REPOSITORY}"
          REPO_OWNER="${REPO_FULL%%/*}"
          REPO_NAME="${REPO_FULL##*/}"
          echo "UPDATE_OWNER=$REPO_OWNER" >> "$GITHUB_ENV"
          echo "UPDATE_REPO=$REPO_NAME" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Publish backend sidecar
        shell: bash
        run: |
          dotnet publish backend/DataToolkit.Api/DataToolkit.Api.csproj \
            -c Release \
            -r ${{ matrix.dotnet_runtime }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=false \
            -o ${{ matrix.publish_dir }}

      - name: Build Electron package
        run: ${{ matrix.builder_cmd }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datatoolkit-${{ runner.os }}-${{ github.sha }}
          path: release/**
          if-no-files-found: error
